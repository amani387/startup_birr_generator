      <stop stop-color="#1a1714"/>
      <stop offset="1" stop-color="#0a0908"/>
    </linearGradient>
    <linearGradient id="tm-gold" x1="32" y1="88" x2="96" y2="24" gradientUnits="userSpaceOnUse">
